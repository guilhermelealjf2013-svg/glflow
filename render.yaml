services:
  - type: web
    name: glflow-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        value: https://client-ecru-nu.vercel.app
      - key: FIREBASE_SERVICE_ACCOUNT
        sync: false
